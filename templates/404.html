<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080808">
    <title>Página não encontrada</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 32px 24px;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 12px;
        }
        .error-msg {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="error-wrap">
        <div class="error-code">404</div>
        <div class="error-msg">Esta página não existe ou a barbearia está inativa.</div>
        <a href="{{ url_for('login') }}" class="btn btn-primary">← Voltar ao início</a>
    </div>
</body>
</html>
