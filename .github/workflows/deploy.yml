name: CI / Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1a. Testes Python ──────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check . --select=E,W,F,B,I --ignore=E501,B008,B904 || true

      - name: Type check (mypy — db/ apenas)
        run: mypy db/ --ignore-missing-imports --no-error-summary || true

      - name: Correr testes Python
        env:
          SECRET_KEY: ci-secret-apenas-testes
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_load.py \
            -v --tb=short --cov=. --cov-report=term-missing

  # ── 1b. Testes JavaScript (Node.js nativo, sem dependências) ───
  test-js:
    name: node:test (JS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Correr testes JS
        run: node --test tests/test_frontend.js

  # ── 1b. Verificar se os Secrets de deploy estão configurados ───
  # Permite que o CI de testes fique sempre verde mesmo sem Secrets;
  # o deploy só activa quando PA_TOKEN existir.
  check-secrets:
    name: Secrets configurados?
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.c.outputs.ready }}
    steps:
      - id: c
        env:
          T: ${{ secrets.PA_TOKEN }}
        run: |
          if [ -n "$T" ]; then
            echo "ready=true"  >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Secrets PA_* ausentes — deploy automático desactivado."
          fi

  # ── 2. Deploy para PythonAnywhere ──────────────────────────────
  # Corre só em push para main, se os testes passaram E os Secrets existirem
  deploy:
    name: Deploy → PythonAnywhere
    needs: [test, test-js, check-secrets]
    if: github.event_name == 'push' && needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest

    env:
      PA_USER:   ${{ secrets.PA_USER }}
      PA_TOKEN:  ${{ secrets.PA_TOKEN }}
      PA_DOMAIN: ${{ secrets.PA_DOMAIN }}
      PA_API:    https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USER }}
      REMOTE:    /home/${{ secrets.PA_USER }}/barbearia

    steps:
      - uses: actions/checkout@v4

      - name: Upload ficheiros Python principais
        run: |
          for f in app.py database.py helpers.py helpers_booking.py helpers_security.py wsgi.py; do
            [ -f "$f" ] || continue
            curl -sf -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                 -H "Authorization: Token ${PA_TOKEN}" \
                 -F "content=@${f}"
            echo "  ✓ ${f}"
          done

      - name: Upload módulo db/
        run: |
          for f in db/__init__.py db/_conn.py db/barbearia.py db/barbeiros.py db/servicos.py db/agendamentos.py db/relatorios.py db/push.py db/rate_limit.py db/migrations.py; do
            [ -f "$f" ] || continue
            curl -sf -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                 -H "Authorization: Token ${PA_TOKEN}" \
                 -F "content=@${f}"
            echo "  ✓ ${f}"
          done

      - name: Upload blueprints/
        run: |
          for f in blueprints/*.py; do
            curl -sf -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                 -H "Authorization: Token ${PA_TOKEN}" \
                 -F "content=@${f}"
            echo "  ✓ ${f}"
          done

      - name: Upload templates
        run: |
          echo "Aguardar 60s para reset do rate-limit PA..."
          sleep 60
          pa_upload() {
            local f=$1
            for attempt in 1 2 3 4; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                   -H "Authorization: Token ${PA_TOKEN}" \
                   -F "content=@${f}")
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
                echo "  ✓ ${f}"
                return 0
              elif [ "$STATUS" = "429" ]; then
                echo "  ⏳ ${f} rate-limited, aguardar ${attempt}m..."
                sleep $((attempt * 60))
              else
                echo "  ✗ ${f} HTTP ${STATUS}"
                return 1
              fi
            done
            echo "  ✗ ${f} falhou após 4 tentativas"
            return 1
          }
          for f in templates/*.html; do
            pa_upload "$f"
            sleep 3
          done

      - name: Upload static (CSS + JS)
        run: |
          for f in static/style.css static/app.js static/sw.js; do
            [ -f "$f" ] || continue
            curl -sf -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                 -H "Authorization: Token ${PA_TOKEN}" \
                 -F "content=@${f}"
            echo "  ✓ ${f}"
          done

      - name: Reload webapp
        run: |
          curl -sf -X POST "${PA_API}/webapps/${PA_DOMAIN}/reload/" \
               -H "Authorization: Token ${PA_TOKEN}"
          echo "✅ Deploy concluído → https://${PA_DOMAIN}"

      - name: Health check + rollback automático em caso de falha
        run: |
          sleep 10
          HTTP=$(curl -s -o /tmp/health_body.txt -w "%{http_code}" \
                      --max-time 15 "https://${PA_DOMAIN}/healthz")
          echo "Health HTTP: ${HTTP}"
          cat /tmp/health_body.txt || true

          if [[ "${HTTP}" == 5* ]]; then
            echo "❌ App retornou ${HTTP} — a fazer rollback (re-upload do commit anterior)..."
            # Re-upload app.py e wsgi.py do commit anterior para recuperação
            git stash 2>/dev/null || true
            git checkout HEAD~1 -- app.py wsgi.py helpers_security.py 2>/dev/null || true
            for f in app.py wsgi.py helpers_security.py; do
              [ -f "$f" ] || continue
              curl -s -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                   -H "Authorization: Token ${PA_TOKEN}" \
                   -F "content=@${f}" -o /dev/null
            done
            curl -s -X POST "${PA_API}/webapps/${PA_DOMAIN}/reload/" \
                 -H "Authorization: Token ${PA_TOKEN}" -o /dev/null
            echo "Rollback enviado. A verificar..."
            sleep 8
            HTTP2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://${PA_DOMAIN}/healthz")
            echo "Health pós-rollback: ${HTTP2}"
            exit 1
          fi

          # Verificar JSON de saúde
          STATUS=$(python3 -c "
          import sys, json
          try:
              d = json.load(open('/tmp/health_body.txt'))
              print(d.get('status', 'unknown'))
          except Exception:
              print('parse_error')
          ")
          echo "Health status: ${STATUS}"
          [ "${STATUS}" = "ok" ] && echo "✅ Deploy concluído → https://${PA_DOMAIN}"
