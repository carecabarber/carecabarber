name: CI / Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Testes ───────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Correr testes
        env:
          SECRET_KEY: ci-secret-apenas-testes
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  # ── 1b. Verificar se os Secrets de deploy estão configurados ───
  # Permite que o CI de testes fique sempre verde mesmo sem Secrets;
  # o deploy só activa quando PA_TOKEN existir.
  check-secrets:
    name: Secrets configurados?
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.c.outputs.ready }}
    steps:
      - id: c
        env:
          T: ${{ secrets.PA_TOKEN }}
        run: |
          if [ -n "$T" ]; then
            echo "ready=true"  >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Secrets PA_* ausentes — deploy automático desactivado."
          fi

  # ── 2. Deploy para PythonAnywhere ──────────────────────────────
  # Corre só em push para main, se os testes passaram E os Secrets existirem
  deploy:
    name: Deploy → PythonAnywhere
    needs: [test, check-secrets]
    if: github.event_name == 'push' && needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest

    env:
      PA_USER:   ${{ secrets.PA_USER }}
      PA_TOKEN:  ${{ secrets.PA_TOKEN }}
      PA_DOMAIN: ${{ secrets.PA_DOMAIN }}
      PA_API:    https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USER }}
      REMOTE:    /home/${{ secrets.PA_USER }}/barbearia

    steps:
      - uses: actions/checkout@v4

      - name: Upload ficheiros Python principais
        run: |
          for f in app.py database.py helpers.py helpers_booking.py helpers_security.py wsgi.py; do
            [ -f "$f" ] || continue
            curl -sf -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                 -H "Authorization: Token ${PA_TOKEN}" \
                 -F "content=@${f}"
            echo "  ✓ ${f}"
          done

      - name: Upload módulo db/
        run: |
          for f in db/__init__.py db/_conn.py db/barbearia.py db/barbeiros.py db/servicos.py db/agendamentos.py db/relatorios.py db/push.py; do
            [ -f "$f" ] || continue
            curl -sf -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                 -H "Authorization: Token ${PA_TOKEN}" \
                 -F "content=@${f}"
            echo "  ✓ ${f}"
          done

      - name: Upload blueprints/
        run: |
          for f in blueprints/*.py; do
            curl -sf -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                 -H "Authorization: Token ${PA_TOKEN}" \
                 -F "content=@${f}"
            echo "  ✓ ${f}"
          done

      - name: Upload templates
        run: |
          echo "Aguardar 60s para reset do rate-limit PA..."
          sleep 60
          pa_upload() {
            local f=$1
            for attempt in 1 2 3 4; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                   -H "Authorization: Token ${PA_TOKEN}" \
                   -F "content=@${f}")
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
                echo "  ✓ ${f}"
                return 0
              elif [ "$STATUS" = "429" ]; then
                echo "  ⏳ ${f} rate-limited, aguardar ${attempt}m..."
                sleep $((attempt * 60))
              else
                echo "  ✗ ${f} HTTP ${STATUS}"
                return 1
              fi
            done
            echo "  ✗ ${f} falhou após 4 tentativas"
            return 1
          }
          for f in templates/*.html; do
            pa_upload "$f"
            sleep 3
          done

      - name: Upload static (CSS + JS)
        run: |
          for f in static/style.css static/app.js static/sw.js; do
            [ -f "$f" ] || continue
            curl -sf -X POST "${PA_API}/files/path${REMOTE}/${f}" \
                 -H "Authorization: Token ${PA_TOKEN}" \
                 -F "content=@${f}"
            echo "  ✓ ${f}"
          done

      - name: Reload webapp
        run: |
          curl -sf -X POST "${PA_API}/webapps/${PA_DOMAIN}/reload/" \
               -H "Authorization: Token ${PA_TOKEN}"
          echo "✅ Deploy concluído → https://${PA_DOMAIN}"

      - name: Health check (aguardar 10s + verificar /healthz)
        run: |
          sleep 10
          STATUS=$(curl -sf "https://${PA_DOMAIN}/healthz" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          echo "Health: ${STATUS}"
          [ "${STATUS}" = "ok" ]
